name: Trigger staging back-sync on release

# Reusable (workflow_call): on a published release, notify the staging repo to
# sync from production immediately. Dispatch-only — it cannot write production
# or staging contents.
#
# Called from the PRODUCTION repo's caller stub (see
# examples/sdk-repo/trigger-back-sync-on-release.yml). Like the other sealed
# workflow files, the stub lives on staging and arrives on production via the
# promote; its self-routing guard keeps it inert on staging.
#
# NOTE: the production repos are public, and a public repo can only call
# reusable workflows in a public repo — one of the reasons this repo must stay
# PUBLIC (see README).
#
# Adapted from stainless/stlc examples/sdk-repo/.github/workflows/trigger-back-sync-on-release.yml.
on:
  workflow_call:
    inputs:
      staging_repo:
        description: 'Staging repo to dispatch the back-sync to, as owner/name (e.g. knocklabs/knock-mgmt-node-staging).'
        required: true
        type: string
    secrets:
      STAGING_DISPATCH_TOKEN:
        description: 'Token that can send a repository_dispatch to the staging repo — a fine-grained PAT with Contents: write on that one repo.'
        required: true

jobs:
  notify:
    runs-on: ubuntu-latest
    env:
      STAGING_REPO: ${{ inputs.staging_repo }}
    steps:
      - name: Dispatch back-sync to staging
        env:
          DISPATCH_TOKEN: ${{ secrets.STAGING_DISPATCH_TOKEN }}
          # The github context belongs to the CALLER, so on a release event
          # this is the release's tag name.
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          [ -n "${DISPATCH_TOKEN:-}" ] || { echo "STAGING_DISPATCH_TOKEN not set" >&2; exit 1; }
          payload=$(jq -n --arg ref "$REF_NAME" '{event_type:"prod-released",client_payload:{ref:$ref}}')
          code=$(curl -sS -o /tmp/dispatch.txt -w '%{http_code}' -X POST \
            -H "Authorization: Bearer ${DISPATCH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${STAGING_REPO}/dispatches" \
            -d "$payload")
          if [ "$code" = "204" ]; then
            echo "Back-sync dispatched to ${STAGING_REPO}."
          else
            echo "Dispatch failed (HTTP $code)" >&2; cat /tmp/dispatch.txt >&2; exit 1
          fi
