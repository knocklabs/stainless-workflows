name: Publish documented OpenAPI spec

# Reusable (workflow_call) job that publishes a Stainless-generated "documented"
# OpenAPI spec (transforms + code samples applied) to the Knock docs repo as a
# PR. Shared across Knock's Stainless config repos (stainless-knock-mapi,
# stainless-knock-api, ...); each keeps a thin caller job that owns the trigger
# and passes the per-repo inputs (source repo + docs path).
#
# When the caller also passes `stainless-autoconfig-path`, the same PR ships
# stainless.autoconfig.yml: the curated Stainless config re-mapped against the
# current spec by `stlc autoconfig`, so endpoints the curated config doesn't
# cover appear with heuristic names instead of silently missing from the docs.
#
# The spec is built locally from the hidden `openapi` target (`stlc build
# --targets openapi`) — no Stainless SaaS round-trip. This replaces the old
# per-service deploy-prod "Create PR on the docs repo" steps (control,
# switchboard), which uploaded the raw spec to Stainless to get the documented
# version.
#
# It builds only the `openapi` target (pure local codegen, no production_repo →
# no SDK repos touched) and consumes nothing the `stlc-generate` pipeline
# produces, so a caller can run the two in parallel and neither blocks the
# other. The caller decides WHEN to publish (its job-level `if:`); this workflow
# is trigger-agnostic.
on:
  workflow_call:
    inputs:
      source-repo:
        description: 'Name of the upstream service repo the spec comes from (e.g. "control", "switchboard"). Drives the docs branch (<source-repo>-openapi-spec-updates), the PR title and the commit message.'
        type: string
        required: true
      docs-spec-path:
        description: 'Destination path of the spec inside the docs repo (e.g. "data/specs/mapi/openapi.yml").'
        type: string
        required: true
      stainless-autoconfig-path:
        description: 'Optional destination path of the autoconfig reference config inside the docs repo (e.g. "data/specs/api/stainless.autoconfig.yml"). When set, `stlc autoconfig` re-maps the curated config against the current spec and the result ships in the same docs PR. Omit to skip.'
        type: string
        default: ''
      workspace:
        description: 'Path to the stainless workspace (contains workspace.json). Matches the stlc-generate default.'
        type: string
        default: stainless
    secrets:
      STLC_READ_TOKEN:
        description: 'PAT with Contents:Read on stainless/stlc* repos. Consumed by the caller repo''s ./.github/actions/setup-stlc to fetch the stlc CLI family.'
        required: true
      DOCS_REPO_TOKEN:
        description: 'Token with write access to the docs repo (clone, push branch, open PR).'
        required: true

permissions:
  # Only reads the caller repo; every docs-repo write goes through DOCS_REPO_TOKEN.
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      # Derived once so the branch/title/commit stay consistent across steps.
      # (`control` -> control-openapi-spec-updates, `switchboard` -> switchboard-...)
      # Bracket notation is the injection-proof form for hyphenated input names.
      DOCS_BRANCH: ${{ inputs['source-repo'] }}-openapi-spec-updates
      SOURCE_REPO: ${{ inputs['source-repo'] }}
      DOCS_REPO: knocklabs/docs
      DOCS_SPEC_PATH: ${{ inputs['docs-spec-path'] }}
      # Full path (from repo root) of the built spec. The openapi target writes
      # openapi.documented.json under the workspace's sdks/ output dir; the
      # filename comes from targets.openapi.options.files in stainless.yml.
      DOCUMENTED_SPEC: ${{ inputs.workspace }}/sdks/openapi/openapi.documented.json
      # Optional autoconfig reference config: destination in the docs repo
      # (empty → skip) and the full path (from repo root) where the build step
      # below writes it. Bracket notation for the hyphenated input name.
      DOCS_AUTOCONFIG_PATH: ${{ inputs['stainless-autoconfig-path'] }}
      AUTOCONFIG_SRC: ${{ inputs.workspace }}/stainless.autoconfig.yml
    steps:
      - name: Checkout config repo
        # No `repository:` → checks out the CALLER's config repo, bringing its
        # stainless/ workspace and its own ./.github/actions/setup-stlc.
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup stlc
        # `./` resolves against the checked-out CALLER repo.
        uses: ./.github/actions/setup-stlc
        with:
          stlc-read-token: ${{ secrets.STLC_READ_TOKEN }}

      - name: Build the documented OpenAPI spec
        # The openapi target is excluded from the default `all`, so name it
        # explicitly. No production_repo → pure local codegen (no push, no
        # integration). Output lands at $DOCUMENTED_SPEC.
        working-directory: ${{ inputs.workspace }}
        run: stlc build --targets openapi

      - name: Build the autoconfig reference config
        # Optional (only when the caller passes stainless-autoconfig-path).
        # Seeds a copy of the curated Stainless config, then lets `stlc
        # autoconfig` patch it in place against the workspace spec: endpoints
        # the curated config doesn't map get heuristic resource/method entries
        # (it may also rewrite existing entries when the spec moved under
        # them). The docs repo can diff this file against its curated config to
        # see exactly which endpoints are missing from the API reference.
        #
        # Deterministic: re-seeded from the curated config every run, so the
        # output is a pure function of (spec, curated config) and the docs PR
        # only shows a diff when one of them actually changed.
        if: inputs['stainless-autoconfig-path'] != ''
        working-directory: ${{ inputs.workspace }}
        run: |
          config=$(jq -r '.stainless_config' workspace.json)
          {
            echo "# AUTO-GENERATED by stlc autoconfig (publish-documented-spec workflow) - do not edit."
            echo "# The curated Stainless config (${config}) re-mapped against the current"
            echo "# spec: endpoints the curated config does not cover appear here with"
            echo "# heuristic names. Diff against the curated config to see unmapped endpoints."
            cat "$config"
          } > stainless.autoconfig.yml
          # --workspace pins the spec source explicitly rather than relying on
          # nearest-workspace detection from the working directory.
          stlc autoconfig -F --workspace workspace.json --config stainless.autoconfig.yml

      - name: Convert documented spec to YAML for docs
        # The openapi target emits JSON (source specs are JSON) and the docs repo
        # stores it as YAML. yq is preinstalled on ubuntu-latest runners.
        run: yq -o=yaml "$DOCUMENTED_SPEC" > openapi.documented.yaml

      - name: Configure git
        run: |
          git config --global user.name "knock-eng-bot"
          git config --global user.email "ops-development@knock.app"

      - name: Clone docs
        env:
          DOCS_REPO_TOKEN: ${{ secrets.DOCS_REPO_TOKEN }}
        run: |
          git clone "https://x-access-token:${DOCS_REPO_TOKEN}@github.com/${DOCS_REPO}.git" docs

      - name: Update OpenAPI spec
        working-directory: ./docs
        run: |
          # Check if the branch already exists on remote
          if git ls-remote --heads origin "$DOCS_BRANCH" | grep -q "$DOCS_BRANCH"; then
            echo "Branch exists on remote, checking out and tracking"
            git checkout -b "$DOCS_BRANCH" "origin/$DOCS_BRANCH"
          else
            echo "Branch does not exist, creating new branch"
            git checkout -b "$DOCS_BRANCH"
          fi
          cp ../openapi.documented.yaml "$DOCS_SPEC_PATH"
          if [ -n "$DOCS_AUTOCONFIG_PATH" ]; then
            cp "../$AUTOCONFIG_SRC" "$DOCS_AUTOCONFIG_PATH"
          fi

      - name: Check for pending changes
        id: pending_changes
        working-directory: ./docs
        run: |
          if [[ -n "$(git status --porcelain)" ]]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push changes
        if: steps.pending_changes.outputs.has_changes == 'true'
        working-directory: ./docs
        run: |
          git add .
          git commit -m "chore: update ${SOURCE_REPO} openapi spec to ${{ github.sha }}"
          git push origin "$DOCS_BRANCH"

      - name: Create PR on the docs repo
        if: steps.pending_changes.outputs.has_changes == 'true'
        working-directory: ./docs
        env:
          GH_TOKEN: ${{ secrets.DOCS_REPO_TOKEN }}
        run: |
          # Check if a PR already exists for this branch
          if ! gh pr list --repo "$DOCS_REPO" --head "$DOCS_BRANCH" --json number --jq '.[] | .number' | grep -q .; then
            echo "No existing PR found, creating new PR"
            gh pr create \
              --repo "$DOCS_REPO" \
              --title "chore: update ${SOURCE_REPO} openapi spec" \
              --body "Automated PR created from GitHub Actions workflow from ${{ github.repository }} (${{ github.sha }})."
          else
            echo "PR already exists for branch ${DOCS_BRANCH}, skipping PR creation"
          fi
