# Copy this file into a STAGING SDK repo as:
#   .github/workflows/stlc-promote.yml
# and seal it with `stlc build` like any custom code.
#
# Replace the hardcoded repo names (this example uses the mAPI node target):
#   knocklabs/knock-mgmt-node-staging  → your staging repo (the `if:` guard)
#   knocklabs/knock-mgmt-node          → your production repo
#
# The promote carries this file to the production repo along with everything
# else; the `if:` guard keeps the job inert there. Pin the `@` ref to a tag
# once the shared repo stabilizes.
name: Promote SDKs

# Manual dispatch: spec/codegen changes accumulate on staging `main`, and a
# maintainer promotes the batch in one fast-forward when ready to cut a
# release. To approval-gate each run, add required reviewers to this repo's
# `production` environment — the reusable workflow's job runs in it.
on:
  workflow_dispatch: {}

jobs:
  promote:
    # Self-routing guard: must name the STAGING repo.
    if: github.repository == 'knocklabs/knock-mgmt-node-staging'
    permissions:
      contents: read
    uses: knocklabs/stainless-workflows/.github/workflows/stlc-promote.yml@main
    with:
      production_repo: knocklabs/knock-mgmt-node
    # Forwards PRODUCTION_REPO_TOKEN (Contents: write on the production repo).
    secrets: inherit
