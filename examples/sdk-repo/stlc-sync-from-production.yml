# Copy this file into a STAGING SDK repo as:
#   .github/workflows/stlc-sync-from-production.yml
# and seal it with `stlc build` like any custom code.
#
# Replace the hardcoded repo names (this example uses the mAPI node target):
#   knocklabs/knock-mgmt-node-staging  → your staging repo (the `if:` guard)
#   knocklabs/knock-mgmt-node          → your production repo
#
# KEEP the workflow name "Sync from production" — trunk-sync-lock.yml's
# workflow_run trigger matches on it. Pin the `@` ref to a tag once the shared
# repo stabilizes.
name: Sync from production

on:
  schedule:
    # Polls for non-release production changes (e.g. a community PR merged
    # between releases). Tighten if you take frequent community PRs.
    - cron: '17 */6 * * *'
  workflow_dispatch: {}
  # The eager path: production's trigger-back-sync-on-release.yml fires this
  # within seconds of a release being published.
  repository_dispatch:
    types: [prod-released]

concurrency:
  group: stlc-sync-from-production
  cancel-in-progress: true

jobs:
  sync:
    # Self-routing guard: must name the STAGING repo. The cron above still
    # fires in the production repo's copy of this file; the guard skips it there.
    if: github.repository == 'knocklabs/knock-mgmt-node-staging'
    # The fast-forward push to staging `main` authenticates as SDK_WRITE_TOKEN's
    # owner — the same identity codegen pushes with, which bypasses the
    # PR-required ruleset on `main` (see the shared repo's README).
    # `contents: write` covers the GITHUB_TOKEN fallback the shared workflow
    # uses when the secret is unset.
    permissions:
      contents: write
    uses: knocklabs/stainless-workflows/.github/workflows/stlc-sync-from-production.yml@main
    with:
      production_repo: knocklabs/knock-mgmt-node
    # Forwards SDK_WRITE_TOKEN for the push. Production is public, so no read
    # secret is needed; if yours is private, also provide PRODUCTION_REPO_TOKEN.
    secrets: inherit
