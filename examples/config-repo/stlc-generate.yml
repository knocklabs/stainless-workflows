# Copy this file into a Stainless config repo as:
#   .github/workflows/stlc-generate.yml
#
# It owns the triggers (which cannot be externalized to a reusable workflow)
# and the `paths:` filters, then delegates all logic to the shared reusable
# workflows: `generate` builds/pushes the SDKs; `publish-documented-spec` opens
# the docs-repo PR. Pin the `@` refs to a tag once the shared repo stabilizes.
name: Generate SDKs with stlc

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'stainless/**'
      - '.github/workflows/stlc-generate.yml'
      - '.github/actions/setup-stlc/**'
  push:
    branches: [main]
    paths:
      - 'stainless/**'
      - '.github/workflows/stlc-generate.yml'
      - '.github/actions/setup-stlc/**'

jobs:
  generate:
    # Grant the GITHUB_TOKEN scopes the reusable workflow needs. The reusable
    # workflow can only ever narrow these, never widen them.
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    uses: knocklabs/stainless-workflows/.github/workflows/stlc-generate.yml@main
    # Forwards STLC_READ_TOKEN and SDK_WRITE_TOKEN from this repo's secrets.
    secrets: inherit
    # Optional — omit to accept the defaults shown:
    # with:
    #   workspace: stainless
    #   targets: all

  # Publish the documented OpenAPI spec (transforms + code samples applied) to
  # knocklabs/docs as a PR. Runs in parallel with `generate` — it builds only the
  # `openapi` target itself and shares nothing with SDK generation, so neither
  # blocks the other. Only on push to main (the `push:` trigger is main-only), so
  # a docs PR is never opened for an in-flight SDK PR.
  #
  # Requires an `openapi` target in stainless.yml that emits a documented spec:
  #   targets:
  #     openapi:
  #       options:
  #         files:
  #           openapi.documented.json: { with: [transforms, code-samples] }
  publish-documented-spec:
    if: github.event_name == 'push'
    permissions:
      # Only reads this repo; all docs-repo writes use DOCS_REPO_TOKEN.
      contents: read
    uses: knocklabs/stainless-workflows/.github/workflows/publish-documented-spec.yml@main
    # Forwards STLC_READ_TOKEN and DOCS_REPO_TOKEN from this repo's secrets.
    secrets: inherit
    with:
      # Per-repo: `source-repo` is the upstream service repo the spec comes from;
      # it drives the docs branch (<source-repo>-openapi-spec-updates), PR title
      # and commit. `docs-spec-path` is the destination in the docs repo.
      #   mapi config repo -> source-repo: control,     docs-spec-path: data/specs/mapi/openapi.yml
      #   api  config repo -> source-repo: switchboard, docs-spec-path: data/specs/api/openapi.yml
      source-repo: CHANGE_ME
      docs-spec-path: data/specs/CHANGE_ME/openapi.yml
      # Optional — omit to accept the default:
      # with:
      #   workspace: stainless
